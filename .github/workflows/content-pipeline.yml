name: Content Pipeline — Fetch & Publish

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes, 24/7
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  fetch-and-publish:
    name: Fetch Updates & Generate Articles
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write           # Required to commit & push new markdown files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run fetch pipeline
        run: node scripts/fetch-updates.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push new content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ data/updates.json
          if git diff --staged --quiet; then
            echo "No new content — nothing to commit"
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | grep '\.md$' | wc -l | tr -d ' ')
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "content: add ${ARTICLE_COUNT} new Microsoft updates [${TIMESTAMP}]"
            git push
            echo "✅ Pushed ${ARTICLE_COUNT} new articles at ${TIMESTAMP}"
          fi

      - name: Log run summary
        if: always()
        run: |
          echo "Pipeline completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Content directory:"
          find content/ -name "*.md" 2>/dev/null | wc -l | xargs -I{} echo "  {} total articles"
