name: Microsoft Updates Automation Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes, 24/7
  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    name: Fetch & Process Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger automation pipeline
        id: trigger
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.PIPELINE_SECRET }}" \
            -H "Content-Type: application/json" \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --max-time 300 \
            "${{ secrets.SITE_URL }}/api/pipeline")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Pipeline failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Log completion
        if: always()
        run: |
          echo "Pipeline run completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
